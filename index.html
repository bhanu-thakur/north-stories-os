<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>North Stories OS</title>
<meta name="theme-color" content="#1E5945">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NORTH STORIES OS — built on the Card Atlas design system.
   Design tokens & components copied verbatim; only app-layout
   rules are appended below the marked divider. Light theme.
   ============================================================ */
:root{
  --bg:#F4F6F2; --ink:#15231D; --ink-soft:#4C5A53; --ink-faint:#7C887F;
  --line:#E1E7DF; --line-strong:#D4DCD3; --card:#FFFFFF;
  --primary:#1E5945; --primary-deep:#143E30; --primary-soft:#E7F0EA;
  --glow:rgba(30,89,69,.06);
  --good:#2E8B6B; --good-soft:#E6F3EC;
  --watch:#B7740E; --watch-ink:#8A5705; --watch-soft:#FBF0DA;
  --alert:#BC4B45; --alert-ink:#9A3A35; --alert-soft:#FAE9E7;
  --c1:#3E7A5A; --c2:#B7740E; --c3:#2E6F8E; --c4:#8A5A7E; --c5:#9A6B3F; --c6:#4E7E8C;
  --radius:20px; --shadow:0 1px 2px rgba(20,40,30,.04),0 8px 28px -12px rgba(20,40,30,.14);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:radial-gradient(1200px 500px at 80% -10%,var(--glow),transparent 60%),var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.13em}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;line-height:1.14;margin:0}
kbd{font-family:'JetBrains Mono',monospace;font-size:.78em;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:6px;padding:1px 6px;background:var(--card);white-space:nowrap}
code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:#FAFBF8;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--ink)}
a{color:var(--primary)}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);font-weight:500;display:flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--primary);opacity:.5}
.stats{display:grid;grid-template-columns:repeat(var(--n,3),1fr);gap:14px;margin-top:6px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat,var(--primary))}
.stat .big{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:600;line-height:1;color:var(--cat,var(--primary))}
.stat .lbl{font-weight:600;margin-top:8px;font-size:.95rem}
.stat .sub{color:var(--ink-faint);font-size:.82rem;margin-top:3px;line-height:1.45}
.sec-head{margin-bottom:22px}
.sec-head h2{font-size:clamp(1.6rem,3.6vw,2.2rem);margin-top:0}
.sec-head p{color:var(--ink-soft);margin:9px 0 0;max-width:66ch}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;box-shadow:var(--shadow);margin-bottom:18px;position:relative;overflow:hidden}
.card.cat{padding-left:30px}
.card.cat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bc,var(--primary))}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.card-title{display:flex;align-items:center;gap:14px}
.ico{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary)}
.ico .ic{width:22px;height:22px}
.card.cat .ico{background:color-mix(in srgb,var(--bc) 13%,var(--card));color:var(--bc)}
.card-title h3{font-size:1.28rem}
.card-title .val{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--ink-faint);margin-top:3px;font-weight:500;letter-spacing:.02em}
.lead{color:var(--ink-soft);margin:13px 0 0;font-size:.95rem}
.grid{display:grid;gap:18px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}
.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:5px 12px;font-size:.74rem;font-weight:700;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.pill--good{background:var(--good-soft);color:var(--good)}
.pill--watch{background:var(--watch-soft);color:var(--watch-ink)}
.pill--alert{background:var(--alert-soft);color:var(--alert-ink)}
.pill--brand{background:var(--primary-soft);color:var(--primary)}
.note{margin-top:16px;border-radius:14px;padding:15px 17px;font-size:.92rem;display:flex;gap:12px;align-items:flex-start;line-height:1.55}
.note .ic{width:18px;height:18px;flex:none;margin-top:2px}
.note--you{background:var(--primary-soft);color:var(--primary-deep)}.note--you b{color:var(--primary-deep)}
.note--done{background:var(--good-soft);color:#1f5f47}.note--done b{color:#17452f}
.note--warn{background:var(--watch-soft);color:var(--watch-ink)}.note--warn b{color:#6e4604}
ul.list{list-style:none;margin:12px 0 0;padding:0}
ul.list li{position:relative;padding:9px 0 9px 24px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:.92rem;line-height:1.55}
ul.list li:first-child{border-top:0}
ul.list li::before{content:"";position:absolute;left:2px;top:17px;width:7px;height:7px;border-radius:50%;background:var(--bc,var(--primary));opacity:.9}
ul.list li b{color:var(--ink);font-weight:600}
ol.steps{list-style:none;counter-reset:s;margin:12px 0 0;padding:0}
ol.steps li{counter-increment:s;display:flex;gap:13px;align-items:flex-start;padding:9px 0;font-size:.93rem;color:var(--ink-soft)}
ol.steps li::before{content:counter(s);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.72rem;flex:none;width:24px;height:24px;border-radius:7px;background:color-mix(in srgb,var(--primary) 12%,#fff);color:var(--primary);display:grid;place-items:center;margin-top:1px}
ol.steps b{color:var(--ink);font-weight:600}
.minigrid{display:grid;grid-template-columns:repeat(var(--m,3),1fr);gap:12px;margin-top:6px}
.cell{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#FAFBF8}
.cell .t{font-family:'JetBrains Mono',monospace;font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);display:flex;gap:6px;align-items:center}
.cell .t .ic{width:13px;height:13px;color:var(--primary)}
.cell .v{font-weight:600;margin-top:5px;font-size:1rem}.cell .v small{font-weight:400;color:var(--ink-faint);font-size:.78rem}
.cell.lever{background:var(--primary-soft);border-color:transparent}.cell.lever .v,.cell.lever .t{color:var(--primary)}
.track{display:flex;gap:3px;height:56px;border-radius:10px;margin-top:8px}
.seg{border-radius:7px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4px;line-height:1.2;min-width:0;overflow:hidden}
.seg .sname{font-size:.66rem;font-weight:700}
.seg .srange{font-family:'JetBrains Mono',monospace;font-size:.6rem;opacity:.85;margin-top:2px}
.seg--good{background:var(--good-soft);color:#256f55}
.seg--watch{background:var(--watch-soft);color:var(--watch-ink)}
.seg--alert{background:var(--alert-soft);color:var(--alert-ink)}
.seg--flat{background:#ECEFEA;color:var(--ink-faint)}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.tile{position:relative;display:block;text-decoration:none;border:1px solid var(--line);border-top:3px solid var(--dc,var(--primary));border-radius:14px;padding:14px 15px;background:var(--card);box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease;cursor:pointer}
a.tile:hover,.tile:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(20,40,30,.05),0 16px 34px -14px rgba(20,40,30,.22)}
.tile .tn{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.06em;color:var(--dc,var(--primary));display:flex;align-items:center;justify-content:space-between}
.tile .tn .ic{width:14px;height:14px}
.tile .tt{font-family:'Fraunces',Georgia,serif;font-size:1.02rem;font-weight:600;margin:6px 0 4px;line-height:1.15;color:var(--ink)}
.tile .td{font-size:.78rem;color:var(--ink-soft);line-height:1.4}
.tile .go{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--dc,var(--primary));display:flex;align-items:center;gap:5px}
.tile .go .ic{width:13px;height:13px}
.pagenav{display:flex;gap:12px;margin-top:24px;align-items:stretch}
.pagenav a,.pagenav span{flex:1;border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-decoration:none;background:var(--card);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:3px;cursor:pointer}
.pagenav .dir{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint)}
.pagenav .ttl{font-family:'Fraunces',Georgia,serif;font-weight:600;color:var(--ink);font-size:.98rem}
.pagenav a:hover{border-color:var(--primary)}.pagenav a:hover .ttl{color:var(--primary)}
.pagenav .disabled{opacity:.5}.pagenav .nextcol{text-align:right}
.codeblock{font-family:'JetBrains Mono',monospace;font-size:.76rem;background:#FAFBF8;border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink);overflow-x:auto;white-space:pre;line-height:1.7;margin-top:12px}
.closing{margin-top:18px;background:var(--primary);color:#eaf4ee;border-radius:var(--radius);padding:26px 30px;display:flex;gap:16px;align-items:flex-start}
.closing .ic{width:24px;height:24px;flex:none;color:#bfe0cd;margin-top:2px}
.closing h3{color:#fff;font-size:1.22rem;margin:0 0 6px}
.closing p{margin:0;color:#cfe6d8;font-size:.95rem}

/* =====================  APP LAYOUT (appended)  ===================== */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;background:color-mix(in srgb,var(--card) 70%,var(--bg));border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.side .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);padding:6px 8px 14px}
.side .brand .mark{width:30px;height:30px;border-radius:9px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:none}
.side .brand .mark .ic{width:17px;height:17px}
.side .brand .bt{font-family:'Fraunces',serif;font-weight:600;font-size:1.04rem;line-height:1}
.side .brand .bt small{display:block;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
.side .seek{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin:0 4px 10px;color:var(--ink-faint);font-size:.82rem;cursor:pointer;background:var(--card)}
.side .seek .ic{width:15px;height:15px}.side .seek kbd{margin-left:auto}
.navgroup{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);padding:14px 12px 5px}
.navlink{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink-soft);padding:8px 12px;border-radius:9px;font-size:.86rem;font-weight:500;cursor:pointer}
.navlink .ic{width:16px;height:16px;flex:none;color:var(--ink-faint)}
.navlink:hover{background:var(--primary-soft);color:var(--ink)}
.navlink.active{background:var(--primary-soft);color:var(--primary)}
.navlink.active .ic{color:var(--primary)}
.main{min-width:0}
.wrap{max-width:920px;margin:0 auto;padding:34px 30px 90px}
.phead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.crumb{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;display:flex;gap:7px;align-items:center}
.crumb a{color:var(--ink-faint);text-decoration:none}.crumb a:hover{color:var(--primary)}
h1.ptitle{font-family:'Fraunces',serif;font-size:clamp(1.9rem,4.5vw,2.7rem);font-weight:500;margin:0}
.psub{color:var(--ink-soft);margin:10px 0 0;max-width:68ch}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none}
.btn .ic{width:15px;height:15px}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn--primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn--primary:hover{background:var(--primary-deep);color:#fff}
.btn--sm{padding:5px 10px;font-size:.74rem;border-radius:8px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tag{font-family:'JetBrains Mono',monospace;font-size:.62rem;background:#FAFBF8;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--ink-soft);cursor:pointer;text-decoration:none}
.tag:hover{border-color:var(--primary);color:var(--primary)}
.check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer;font-size:.92rem;color:var(--ink-soft)}
.check:first-child{border-top:0}
.check .box{width:20px;height:20px;border:1.8px solid var(--line-strong);border-radius:6px;flex:none;display:grid;place-items:center;margin-top:1px;color:transparent;transition:.12s}
.check.on .box{background:var(--primary);border-color:var(--primary);color:#fff}
.check.on .lab{color:var(--ink-faint);text-decoration:line-through}
.check .box .ic{width:13px;height:13px}
.progbar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:6px}
.progbar > i{display:block;height:100%;background:var(--primary);border-radius:999px}
details.exp{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;background:var(--card);overflow:hidden}
details.exp > summary{list-style:none;cursor:pointer;padding:16px 20px;display:flex;align-items:center;gap:12px;font-family:'Fraunces',serif;font-size:1.08rem;font-weight:600}
details.exp > summary::-webkit-details-marker{display:none}
details.exp > summary .num{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;width:26px;height:26px;border-radius:7px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;flex:none}
details.exp > summary .chev{margin-left:auto;color:var(--ink-faint);transition:.15s}
details.exp[open] > summary .chev{transform:rotate(90deg)}
details.exp .body{padding:0 20px 20px;color:var(--ink-soft);font-size:.93rem}
details.exp .body p{margin:10px 0}
.table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.86rem}
.table th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line-strong)}
.table td{padding:10px;border-bottom:1px solid var(--line);color:var(--ink-soft);vertical-align:top}
.table tr:hover td{background:#FAFBF8}
.input,select.input,textarea.input{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:.88rem;background:var(--card);color:var(--ink)}
textarea.input{min-height:80px;resize:vertical;line-height:1.5}
.input:focus{outline:none;border-color:var(--primary)}
.field{margin-bottom:12px}.field label{display:block;font-size:.74rem;font-weight:600;color:var(--ink-soft);margin-bottom:5px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;text-transform:uppercase}
.backlinks{margin-top:22px;border-top:1px dashed var(--line-strong);padding-top:16px}
.backlinks .bl-h{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
.chiplink{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:.78rem;text-decoration:none;color:var(--ink-soft);background:var(--card);margin:0 6px 6px 0;cursor:pointer}
.chiplink:hover{border-color:var(--primary);color:var(--primary)}
.chiplink .ic{width:13px;height:13px;color:var(--ink-faint)}
.empty{text-align:center;color:var(--ink-faint);padding:40px 20px;border:1px dashed var(--line-strong);border-radius:16px;background:rgba(255,255,255,.4)}
.empty .ic{width:30px;height:30px;color:var(--line-strong)}
/* command palette */
.pal-bg{position:fixed;inset:0;background:rgba(20,40,30,.28);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:12vh}
.pal-bg.on{display:flex}
.pal{width:min(640px,92vw);background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 80px -20px rgba(20,40,30,.5);overflow:hidden}
.pal input{width:100%;border:0;border-bottom:1px solid var(--line);padding:18px 20px;font-family:inherit;font-size:1.02rem;background:transparent;color:var(--ink)}
.pal input:focus{outline:none}
.pal-res{max-height:50vh;overflow-y:auto;padding:8px}
.pal-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:.9rem}
.pal-item .ic{width:16px;height:16px;color:var(--ink-faint);flex:none}
.pal-item .pk{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--ink-faint);margin-left:auto;text-transform:uppercase;letter-spacing:.06em}
.pal-item.sel,.pal-item:hover{background:var(--primary-soft);color:var(--primary)}
.pal-item.sel .ic,.pal-item:hover .ic{color:var(--primary)}
.mobnav{display:none}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .wrap{padding:18px 18px 110px}
  .g2,.g3{grid-template-columns:1fr}.stats{grid-template-columns:1fr}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:120;background:color-mix(in srgb,var(--card) 92%,transparent);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 6px env(safe-area-inset-bottom);justify-content:space-around}
  .mobnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--ink-faint);font-size:.58rem;font-family:'JetBrains Mono',monospace;padding:5px 0;cursor:pointer}
  .mobnav a .ic{width:20px;height:20px}
  .mobnav a.active{color:var(--primary)}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ===== PROJECT / DAY-PAGE COMPONENTS (inspired by the reference day pages) ===== */
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
.tnode{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 13px;box-shadow:var(--shadow);font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--ink-soft)}
.tnode .ic{width:15px;height:15px;color:var(--primary)}
.capture{background:var(--primary-soft);border-radius:18px;padding:20px 22px;margin-top:18px}
.capture .ch{display:flex;align-items:center;gap:10px;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.12rem;color:var(--primary-deep);margin:0 0 6px;line-height:1.2}
.capture .ch .ic{width:21px;height:21px;flex:none;color:var(--primary)}
.capture .intro{font-size:.96rem;line-height:1.6;color:var(--primary-deep);margin:0 0 10px}
.capture ol{list-style:none;counter-reset:cap;margin:0;padding:0}
.capture ol li{counter-increment:cap;position:relative;padding:9px 0 9px 38px;font-size:.96rem;line-height:1.55;color:var(--ink)}
.capture ol li+li{border-top:1px solid color-mix(in srgb,var(--primary) 14%,transparent)}
.capture ol li::before{content:counter(cap);position:absolute;left:0;top:9px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.72rem;width:26px;height:26px;border-radius:8px;background:var(--primary);color:#fff;display:grid;place-items:center}
.capture ol li b{color:var(--primary-deep);font-weight:600}
.inspo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:var(--primary);background:var(--card);border:1px solid var(--line-strong);border-radius:999px;padding:9px 15px;margin-top:14px;box-shadow:var(--shadow);transition:background .15s,color .15s,border-color .15s}
.inspo:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.inspo .ic{width:15px;height:15px}
.playback{margin-top:16px;border:1px solid var(--line);border-radius:18px;padding:20px 24px;background:var(--card);box-shadow:var(--shadow)}
.playback .ph{display:flex;align-items:center;gap:11px;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.16rem;color:var(--ink);margin:0 0 10px}
.playback .ph .ic{width:23px;height:23px;flex:none;color:var(--primary)}
.playback .beat{display:flex;gap:13px;align-items:flex-start;padding:10px 0;font-size:.97rem;line-height:1.55;color:var(--ink-soft)}
.playback .beat+.beat{border-top:1px solid var(--line)}
.playback .beat .tc{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.78rem;flex:none;color:#fff;background:var(--primary);border-radius:7px;padding:4px 9px;margin-top:1px;white-space:nowrap}
.playback .beat b{color:var(--ink)}
.playback .land{margin:12px 0 0;font-size:1rem;line-height:1.6;color:var(--primary-deep);font-weight:500}
/* mastery stepper + skill node */
.mstage{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 11px;font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:700;color:#fff}
.stepper{display:flex;gap:3px;margin-top:10px;flex-wrap:wrap}
.stepper .st{flex:1;min-width:54px;border-radius:6px;padding:6px 4px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.56rem;font-weight:700;background:#ECEFEA;color:var(--ink-faint);line-height:1.25}
.stepper .st.done{background:var(--primary-soft);color:var(--primary)}
.stepper .st.now{background:var(--primary);color:#fff}
.skillnode{position:relative;display:block;text-decoration:none;border:1px solid var(--line);border-left:4px solid var(--sc,var(--primary));border-radius:12px;padding:13px 15px;background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s}
.skillnode:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(20,40,30,.05),0 14px 30px -14px rgba(20,40,30,.2)}
.skillnode .sname{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;color:var(--ink)}
.skillnode .sblurb{font-size:.8rem;color:var(--ink-soft);margin-top:3px;line-height:1.4}
</style>
